name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK (Fdroid flavor)
        run: ./gradlew :app:assembleFdroidDebug --no-daemon --stacktrace

      - name: Build debug APK (PlayStore flavor)
        run: ./gradlew :app:assemblePlayStoreDebug --no-daemon --stacktrace

      # Generate a fresh debug keystore at /tmp so the release assemble step can sign
      # if the signing properties file is present. Since we don't have the real release
      # keystore in CI, we'll point the release build at a debug keystore via a signing
      # properties file.
      - name: Generate CI signing keystore
        run: |
          mkdir -p /tmp
          keytool -genkey -v \
            -keystore /tmp/xed.keystore \
            -alias testkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass testkey \
            -keypass testkey \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=CI"
          cat > /tmp/signing.properties <<EOF
          keyAlias=testkey
          keyPassword=testkey
          storePassword=testkey
          storeFile=/tmp/xed.keystore
          EOF

      - name: Build release APK (Fdroid flavor)
        run: ./gradlew :app:assembleFdroidRelease --no-daemon --stacktrace

      - name: Build release APK (PlayStore flavor)
        run: ./gradlew :app:assemblePlayStoreRelease --no-daemon --stacktrace

      - name: Locate built APKs
        id: locate
        run: |
          set -e
          echo "Listing all built APKs:"
          find app/build/outputs/apk -type f -name '*.apk' | sort
          {
            echo "fdroid_debug=$(find app/build/outputs/apk -type f -name '*Fdroid*debug*.apk' | head -1)"
            echo "fdroid_release=$(find app/build/outputs/apk -type f -name '*Fdroid*release*.apk' | head -1)"
            echo "playstore_debug=$(find app/build/outputs/apk -type f -name '*PlayStore*debug*.apk' | head -1)"
            echo "playstore_release=$(find app/build/outputs/apk -type f -name '*PlayStore*release*.apk' | head -1)"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Fdroid Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ReTerminal-Fdroid-Debug
          path: ${{ steps.locate.outputs.fdroid_debug }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Fdroid Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ReTerminal-Fdroid-Release
          path: ${{ steps.locate.outputs.fdroid_release }}
          if-no-files-found: warn
          retention-days: 30

      - name: Upload PlayStore Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ReTerminal-PlayStore-Debug
          path: ${{ steps.locate.outputs.playstore_debug }}
          if-no-files-found: warn
          retention-days: 30

      - name: Upload PlayStore Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ReTerminal-PlayStore-Release
          path: ${{ steps.locate.outputs.playstore_release }}
          if-no-files-found: warn
          retention-days: 30

      - name: Upload build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/
            **/build/outputs/logs/
          if-no-files-found: ignore
          retention-days: 7
